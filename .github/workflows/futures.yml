name: Bot 2 — Cycle horaire

on:
  schedule:
    # Toutes les heures à HH:00 UTC
    - cron: '0 * * * *'
  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Le workflow doit pouvoir push la DB SQLite après chaque cycle
# pour persister l'état du compte entre runs.
permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # le scan tourne en ~30s mais on laisse de la marge

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot 2 cycle
        env:
          DEMO_OKX_API_KEY:    ${{ secrets.DEMO_OKX_API_KEY }}
          DEMO_OKX_SECRET:     ${{ secrets.DEMO_OKX_SECRET }}
          DEMO_OKX_PASSPHRASE: ${{ secrets.DEMO_OKX_PASSPHRASE }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          # chat_id hardcode car ce n'est pas un vrai secret (juste un ID Telegram
          # public) et le secret GitHub Actions semble corrompu (chat not found 400).
          TELEGRAM_CHAT_ID:    "5247371776"
        run: python run_once_futures.py

      - name: Persist state (paper_trades.db + regime cache)
        run: |
          git config user.name  "Bot 2 Futures"
          git config user.email "bot2@trading.local"
          git add data/
          if git diff --cached --quiet; then
            echo "Aucun changement d'état — pas de commit"
          else
            git commit -m "chore: update paper trades state [skip ci]"
            git push
          fi
